services:
  - type: web
    name: loop-messenger
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
    disk:
      name: loop-data
      mountPath: /var/data
      sizeGB: 1
